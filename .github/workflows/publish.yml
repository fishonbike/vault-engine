name: Publish to PyPI

# Publishes on every GitHub Release using PyPI Trusted Publishing (OIDC) — no
# API token or secret required. One-time setup on PyPI:
#   PyPI → your project → Publishing → add a trusted publisher:
#     owner = <your gh user>, repo = vault-engine,
#     workflow = publish.yml, environment = pypi
# Then: create a GitHub Release (tag e.g. v0.1.0) and this runs.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
